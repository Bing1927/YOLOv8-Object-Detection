# Pascal VOC 2007 dataset for YOLOv8
# Path should be relative to the directory where YOLO is executed, or absolute.
# It's recommended to use paths relative to the current working directory, or absolute paths.

# Directory paths
path: ./data/yolo_format # dataset root dir
train: images/train # train images (relative to 'path')
val: images/val # val images (relative to 'path')
test: # test images (optional)

# Classes
names:
  0: aeroplane
  1: bicycle
  2: bird
  3: boat
  4: bottle
  5: bus
  6: car
  7: cat
  8: chair
  9: cow
  10: diningtable
  11: dog
  12: horse
  13: motorbike
  14: person
  15: pottedplant
  16: sheep
  17: sofa
  18: train
  19: tvmonitor
